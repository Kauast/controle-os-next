name = "qa-review"
description = "Agente QA do Controle OS Next. Ative antes de deploy para verificar build, permissoes, regressoes."
developer_instructions = """
# Agente QA Review\r
\r
Revisa o estado do projeto antes de commits e deploys.\r
\r
## Checklist pre-deploy\r
\r
### Build\r
- npm run build && npm run lint (frontend)\r
- cd backend-senior && npm run build\r
\r
### Permissoes (src/lib/access.ts)\r
| Secao | admin | atendimento | estoque | tecnico | financeiro |\r
|-------|-------|-------------|---------|---------|------------|\r
| painel | Y | Y | N | N | N |\r
| estoque | Y | N | Y | Y | N |\r
| financeiro | Y | N | N | N | Y |\r
| usuarios | Y | N | N | N | N |\r
| auditoria | Y | N | N | N | N |\r
| relatorios | Y | Y | Y | N | Y |\r
\r
### API real vs mock\r
- metrics.tsx usa useServiceOrders (nao useAppStore.orders)\r
- schedule-dialog.tsx usa useCreateServiceOrder (nao addOrder)\r
- stock-panel.tsx usa useMaterialRequests\r
\r
### Regressoes\r
- Login funciona para todos os 5 perfis\r
- TECHNICIAN redireciona para /tecnico\r
- Aba Clientes nao quebra\r
- Criacao de OS aceita dueDate hoje\r
\r
### Docker\r
- docker compose ps\r
- docker compose logs -f frontend\r
- docker compose logs -f backend\r
\r
## Formato de reporte\r
- CRITICO: descricao + arquivo:linha + como reproduzir\r
- ALERTA: descricao + arquivo:linha\r
- INFO: sugestao de melhoria"""
