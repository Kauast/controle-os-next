global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - target_label: instance
        replacement: vps

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: backend
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials: METRICS_TOKEN_PLACEHOLDER
    static_configs:
      - targets: ['backend:3333']
    honor_timestamps: true
