  inventory-svc:
    build:
      context: ./services/inventory
      dockerfile: Dockerfile
    container_name: controle-os-inventory-svc
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev}@inventory-db:5432/inventory
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-admin}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-mude-em-producao-use-32-chars}
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - controle-os

  workforce-svc:
    build:
      context: ./services/workforce
      dockerfile: Dockerfile
    container_name: controle-os-workforce-svc
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev}@workforce-db:5432/workforce
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-admin}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-mude-em-producao-use-32-chars}
    depends_on:
      workforce-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - controle-os

  service-order-svc:
    build:
      context: ./services/service-order
      dockerfile: Dockerfile
    container_name: controle-os-service-order-svc
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev}@service-order-db:5432/service_order
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-admin}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-mude-em-producao-use-32-chars}
      CUSTOMER_SVC_URL: http://customer-svc:3002
      WORKFORCE_SVC_URL: http://workforce-svc:3005
      INVENTORY_SVC_URL: http://inventory-svc:3004
      CHIP_SVC_URL: http://chip-svc:3003
    depends_on:
      service-order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - controle-os

  billing-svc:
    build:
      context: ./services/billing
      dockerfile: Dockerfile
    container_name: controle-os-billing-svc
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: development
      PORT: 3007
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev}@billing-db:5432/billing
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-admin}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-mude-em-producao-use-32-chars}
    depends_on:
      billing-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3007/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - controle-os

  media-svc:
    build:
      context: ./services/media
      dockerfile: Dockerfile
    container_name: controle-os-media-svc
    restart: unless-stopped
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: development
      PORT: 3008
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev}@media-db:5432/media
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-admin}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-mude-em-producao-use-32-chars}
      STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: controle-os-media
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_REGION: us-east-1
    depends_on:
      media-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3008/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - controle-os

  notification-svc:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: controle-os-notification-svc
    restart: unless-stopped
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: development
      PORT: 3009
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev}@notification-db:5432/notification
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-admin}:${RABBITMQ_DEFAULT_PASS:-admin}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-mude-em-producao-use-32-chars}
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3009/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - controle-os

# =============================================================================
# Rede interna
# =============================================================================

networks:
  controle-os:
    driver: bridge

# =============================================================================
# Volumes persistentes
# =============================================================================

volumes:
  rabbitmq-data:
  redis-data:
  minio-data:
  identity-db-data:
  customer-db-data:
  chip-db-data:
  inventory-db-data:
  workforce-db-data:
  service-order-db-data:
  billing-db-data:
  media-db-data:
  notification-db-data:
