version: "3.9"

# =============================================================================
# controle-os-next — Docker Compose para microservicos (producao)
#
# Uso:
#   docker compose -f docker-compose.microservices.yml \
#                  -f docker-compose.microservices.prod.yml up -d
#
# Diferencas em relacao ao dev:
#   - Portas dos bancos NAO expostas para o host
#   - Variaveis sensiveis via arquivo .env.prod (nunca committado)
#   - Limites de CPU/memoria definidos via deploy.resources
#   - NODE_ENV=production em todos os servicos
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infraestrutura — sem exposicao de portas de gestao em producao
  # ---------------------------------------------------------------------------

  rabbitmq:
    ports: !reset []
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  redis:
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M

  minio:
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ---------------------------------------------------------------------------
  # Bancos de dados — sem exposicao de porta para o host
  # ---------------------------------------------------------------------------

  identity-db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  customer-db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  chip-db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  inventory-db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  workforce-db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  service-order-db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  billing-db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  media-db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  notification-db:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ---------------------------------------------------------------------------
  # Microservicos — configuracao de producao
  # ---------------------------------------------------------------------------

  identity-svc:
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  customer-svc:
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  chip-svc:
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  inventory-svc:
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  workforce-svc:
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  service-order-svc:
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  billing-svc:
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  media-svc:
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  notification-svc:
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
